<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <title>GTD Fukuoka Enterprise</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --bg: #f4f6f8; --card: #ffffff; --text: #2c3e50; --border: #dfe6e9; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --card: #2d3436; --text: #dfe6e9; --border: #444; } }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 80px; transition: background 0.3s; }
        
        /* Layout Grid & Container */
        .container { max-width: 1000px; margin: 0 auto; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sync-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 12px; background: #eee; color: #555; display: flex; align-items: center; gap: 5px; font-weight: 600; border: 1px solid var(--border); }
        .sync-badge.online { color: var(--success); border-color: var(--success); background: rgba(39, 174, 96, 0.1); }
        .sync-badge.syncing { color: var(--accent); border-color: var(--accent); background: rgba(52, 152, 219, 0.1); }
        .sync-badge.error { color: var(--danger); border-color: var(--danger); background: rgba(231, 76, 60, 0.1); }
        
        /* Inputs */
        .input-wrapper { display: flex; gap: 8px; margin-bottom: 15px; background: var(--card); padding: 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input[type="text"] { flex: 1; border: none; font-size: 16px; background: transparent; color: var(--text); padding: 8px; }
        button { border: none; cursor: pointer; border-radius: 8px; font-weight: 600; transition: transform 0.1s, opacity 0.2s; display: flex; align-items: center; justify-content: center; }
        button:active { transform: scale(0.95); }
        .btn-main { background: var(--accent); color: white; width: 44px; height: 44px; font-size: 1.2rem; }
        
        /* Lists Grid */
        .lists-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .list-column { background: var(--card); border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; max-height: 80vh; }
        .list-header { padding: 12px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); border-radius: 10px 10px 0 0; z-index: 10; cursor: pointer; }
        .list-body { overflow-y: auto; padding: 5px; flex-grow: 1; min-height: 50px; }
        
        /* Task Item */
        .task { background: var(--bg); border: 1px solid var(--border); margin-bottom: 6px; padding: 10px; border-radius: 6px; display: flex; gap: 10px; align-items: start; animation: slideIn 0.2s; position: relative; }
        .task-content { flex: 1; overflow-wrap: anywhere; font-size: 0.95rem; line-height: 1.4; }
        .task-meta { font-size: 0.75rem; color: #888; margin-top: 4px; display: block; }
        .task-actions { display: flex; gap: 5px; opacity: 0.8; }
        .btn-act { width: 30px; height: 30px; border-radius: 4px; font-size: 0.9rem; background: rgba(0,0,0,0.05); color: var(--text); }
        .btn-act:hover { background: var(--accent); color: white; }
        .btn-act.del:hover { background: var(--danger); }
        
        /* Badges & Colors */
        .badge { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; color: #555; }
        .border-inbox { border-top: 3px solid var(--danger); }
        .border-next { border-top: 3px solid var(--success); }
        .border-waiting { border-top: 3px solid var(--warning); }
        .border-calendar { border-top: 3px solid #4285f4; }
        
        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal { background: var(--card); width: 90%; max-width: 450px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin-top: 0; color: var(--text); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: #888; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .full-btn { width: 100%; padding: 12px; margin-top: 10px; background: var(--primary); color: white; }
        
        /* Utilities */
        .hidden { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #toast.visible { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <h2 style="margin:0; font-size:1.3rem;">GTD Fukuoka <span style="font-size:0.6em; opacity:0.6;">v10 Ent.</span></h2>
        <div style="display:flex; gap:10px;">
            <div id="syncStatus" class="sync-badge" onclick="App.sync(true)">
                <span class="dot">●</span> <span>Offline</span>
            </div>
            <button class="btn-act" onclick="UI.openConfig()">⚙️</button>
        </div>
    </div>

    <!-- Smart Input -->
    <div class="input-wrapper">
        <input type="text" id="quickInput" placeholder="O que precisa ser feito?" onkeypress="if(event.key==='Enter') App.addItem()">
        <button class="btn-main" onclick="App.addItem()">+</button>
        <button class="btn-main" style="background:#8e44ad" onclick="AI.magicProcess()" title="Processar com IA">✨</button>
    </div>

    <!-- Lists Rendering Zone -->
    <div id="appGrid" class="lists-grid"></div>
</div>

<!-- Modals -->
<div id="configModal" class="overlay">
    <div class="modal">
        <h3>Configurações (Seguras)</h3>
        <p style="font-size:0.8rem; color:var(--warning)">⚠️ Tokens são ofuscados localmente.</p>
        <div class="form-group"><label>GitHub User</label><input id="cfgUser"></div>
        <div class="form-group"><label>Repo Name</label><input id="cfgRepo"></div>
        <div class="form-group"><label>Token (PAT)</label><input type="password" id="cfgToken"></div>
        <div class="form-group"><label>File Path</label><input id="cfgPath" value="gtd_tasks.json"></div>
        <hr style="border:0; border-top:1px solid var(--border)">
        <div class="form-group"><label>Gemini API Key</label><input type="password" id="cfgGemini"></div>
        <div class="form-group"><label>Google Client ID</label><input id="cfgGoogle"></div>
        <div class="grid-btns">
            <button class="full-btn" style="background:#7f8c8d" onclick="UI.closeModal('configModal')">Cancelar</button>
            <button class="full-btn" style="background:var(--success)" onclick="Config.save()">Salvar</button>
        </div>
    </div>
</div>

<div id="contextModal" class="overlay">
    <div class="modal">
        <h3 id="ctxTitle">Mover Tarefa</h3>
        <div class="grid-btns" id="ctxButtons"></div>
        <button class="full-btn" style="background:transparent; color:#555; border:1px solid #ccc; margin-top:15px;" onclick="UI.closeModal('contextModal')">Fechar</button>
    </div>
</div>

<div id="toast">Notificação</div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
/** 
 * CORE ARCHITECTURE
 * Módulo Pattern para encapsulamento e segurança de escopo.
 */

// --- 1. UTILS & SECURITY ---
const Utils = {
    uuid: () => Date.now().toString(36) + Math.random().toString(36).substr(2),
    now: () => new Date().toISOString(),
    // Ofuscação simples para evitar 'olheiros' (Não é criptografia militar, mas evita texto plano)
    obscure: (str) => { if(!str) return ''; try { return btoa(str.split('').map((c,i) => String.fromCharCode(c.charCodeAt(0) ^ 123)).join('')); } catch(e){return str;} },
    reveal: (str) => { if(!str) return ''; try { return atob(str).split('').map((c,i) => String.fromCharCode(c.charCodeAt(0) ^ 123)).join(''); } catch(e){return str;} },
    debounce: (func, wait) => { let timeout; return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait); }; }
};

// --- 2. CONFIG MANAGER ---
const Config = {
    data: {},
    load: () => {
        const stored = localStorage.getItem('gtd_cfg_v1');
        Config.data = stored ? JSON.parse(stored) : {};
    },
    save: () => {
        const data = {
            ghUser: document.getElementById('cfgUser').value.trim(),
            ghRepo: document.getElementById('cfgRepo').value.trim(),
            ghToken: Utils.obscure(document.getElementById('cfgToken').value.trim()),
            ghPath: document.getElementById('cfgPath').value.trim(),
            geminiKey: Utils.obscure(document.getElementById('cfgGemini').value.trim()),
            googleId: document.getElementById('cfgGoogle').value.trim()
        };
        localStorage.setItem('gtd_cfg_v1', JSON.stringify(data));
        Config.data = data;
        location.reload();
    },
    get: (key) => key.includes('Token') || key.includes('Key') ? Utils.reveal(Config.data[key]) : Config.data[key]
};

// --- 3. DATA STORE (The Truth) ---
const Store = {
    items: [],
    sha: null, // GitHub SHA tracker
    lastSync: 0,
    
    init: () => {
        const local = localStorage.getItem('gtd_items');
        Store.items = local ? JSON.parse(local) : [];
        Store.sha = localStorage.getItem('gtd_sha');
    },
    
    // O Coração do "Merge" - Last Write Wins por Item
    merge: (remoteItems) => {
        let changes = 0;
        const localMap = new Map(Store.items.map(i => [i.id, i]));
        
        remoteItems.forEach(rItem => {
            const localItem = localMap.get(rItem.id);
            // Se não existe localmente ou o remoto é mais novo que o local
            if (!localItem || new Date(rItem.updatedAt) > new Date(localItem.updatedAt)) {
                localMap.set(rItem.id, rItem);
                changes++;
            }
        });
        
        Store.items = Array.from(localMap.values());
        // Limpeza de lixo (Soft Deletes antigos)
        Store.items = Store.items.filter(i => !i._deleted || (new Date() - new Date(i.updatedAt) < 24*60*60*1000)); // Mantém deletados por 24h para propagação
        
        Store.persist();
        return changes > 0;
    },

    add: (text, status = 'inbox') => {
        Store.items.push({
            id: Utils.uuid(),
            text,
            status,
            updatedAt: Utils.now(),
            createdAt: Utils.now()
        });
        Store.persist();
        Sync.trigger(); // Trigger debounced sync
    },

    update: (id, payload) => {
        const idx = Store.items.findIndex(i => i.id === id);
        if (idx > -1) {
            Store.items[idx] = { ...Store.items[idx], ...payload, updatedAt: Utils.now() };
            Store.persist();
            Sync.trigger();
        }
    },

    // Soft Delete: Marca como deletado para propagar a exclusão
    delete: (id) => {
        const idx = Store.items.findIndex(i => i.id === id);
        if (idx > -1) {
            Store.items[idx]._deleted = true;
            Store.items[idx].updatedAt = Utils.now();
            Store.persist();
            Sync.trigger();
        }
    },

    persist: () => {
        localStorage.setItem('gtd_items', JSON.stringify(Store.items));
        if(Store.sha) localStorage.setItem('gtd_sha', Store.sha);
        UI.render();
    }
};

// --- 4. SYNC ENGINE (GitHub API) ---
const Sync = {
    status: 'offline', // offline, syncing, online, error
    
    setStatus: (s) => {
        Sync.status = s;
        const badges = {
            'offline': ['● Offline', ''],
            'syncing': ['↻ Sync...', 'syncing'],
            'online': ['● Online', 'online'],
            'error': ['! Erro', 'error']
        };
        const el = document.getElementById('syncStatus');
        el.innerHTML = badges[s][0];
        el.className = `sync-badge ${badges[s][1]}`;
    },

    // Debounced Sync trigger
    trigger: null, // Será definido no init

    // Protocolo de Sincronização Robusto
    perform: async (force = false) => {
        const token = Config.get('ghToken');
        const user = Config.get('ghUser');
        const repo = Config.get('ghRepo');
        
        if (!token || !user || !repo) return Sync.setStatus('offline');
        
        Sync.setStatus('syncing');
        const url = `https://api.github.com/repos/${user}/${repo}/contents/${Config.get('ghPath')}`;
        
        try {
            // 1. GET (Baixar Remoto)
            const res = await fetch(url, { 
                headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' } 
            });
            
            let remoteContent = [];
            let remoteSha = null;

            if (res.status === 200) {
                const data = await res.json();
                remoteSha = data.sha;
                // Suporte a UTF-8 via decodeURIComponent
                remoteContent = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            } else if (res.status === 404) {
                console.log("Criando arquivo remoto...");
            } else {
                throw new Error("GitHub Error " + res.status);
            }

            // 2. MERGE (Resolver Conflitos)
            const hasUpdates = Store.merge(remoteContent);
            Store.sha = remoteSha; // Atualiza SHA base

            // 3. Verifica se precisamos fazer PUT (Se mudou algo localmente que o remoto não tinha, ou vice-versa)
            // Calculamos se o estado atual é diferente do que veio do remoto
            const localString = JSON.stringify(Store.items.filter(i => !i._deleted)); // O que vamos salvar (sem lixo)
            const remoteString = JSON.stringify(remoteContent);
            
            // Se estamos forçando ou se há discrepância, fazemos PUT
            // Nota: Para "Enterprise", comparamos hashes, mas aqui comparamos strings por simplicidade
            if (localString !== remoteString) {
                const putBody = {
                    message: "GTD Sync " + Utils.now(),
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(Store.items)))), // Salva tudo, incl. deleted para outros devices saberem
                    sha: remoteSha 
                };

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(putBody)
                });

                if (putRes.ok) {
                    const putData = await putRes.json();
                    Store.sha = putData.content.sha;
                    Store.persist();
                    Sync.setStatus('online');
                } else {
                    if (putRes.status === 409) {
                        console.warn("Conflito de SHA! Tentando novamente...");
                        setTimeout(() => Sync.perform(), 1000); // Retry automático
                        return;
                    }
                    throw new Error("Save Error");
                }
            } else {
                Sync.setStatus('online');
            }

        } catch (e) {
            console.error(e);
            Sync.setStatus('error');
            UI.toast("Erro de Sync: " + e.message);
        }
    }
};

// --- 5. UI MANAGER ---
const UI = {
    lists: ['inbox', 'do-now', 'next', 'waiting', 'calendar', 'project', 'someday', 'reference'],
    names: { 'inbox': '📥 Entrada', 'do-now': '⚡ Fazer Agora', 'next': '🔥 Próximas', 'waiting': '⏳ Delegado', 'calendar': '📅 Agenda', 'project': '📂 Projetos', 'someday': '💡 Talvez', 'reference': '📚 Ref.' },
    
    init: () => {
        // Prepara Grid
        const grid = document.getElementById('appGrid');
        grid.innerHTML = '';
        UI.lists.forEach(key => {
            const col = document.createElement('div');
            col.className = `list-column border-${key}`;
            col.innerHTML = `
                <div class="list-header" onclick="App.addToList('${key}')">
                    ${UI.names[key]} <span class="badge" id="badge-${key}">0</span>
                </div>
                <div class="list-body" id="list-${key}"></div>
            `;
            grid.appendChild(col);
        });
        
        // Popula Config
        if(Config.get('ghUser')) {
            document.getElementById('cfgUser').value = Config.get('ghUser');
            document.getElementById('cfgRepo').value = Config.get('ghRepo');
            document.getElementById('cfgToken').value = Config.get('ghToken'); // Já revela no get
            document.getElementById('cfgGemini').value = Config.get('geminiKey') || '';
            document.getElementById('cfgGoogle').value = Config.get('googleId') || '';
        } else {
            UI.openConfig();
        }
    },

    render: () => {
        // Limpa Listas (Performance: poderíamos usar diffing, mas para <1000 items innerHTML é ok)
        UI.lists.forEach(k => {
            document.getElementById(`list-${k}`).innerHTML = '';
            document.getElementById(`badge-${k}`).innerText = '0';
        });

        // Ordena: Mais recentes primeiro (exceto calendar que é por data)
        const activeItems = Store.items.filter(i => !i._deleted);
        
        activeItems.sort((a,b) => {
            if(a.status === 'calendar' && a.date && b.date) return new Date(a.date) - new Date(b.date);
            return new Date(b.updatedAt) - new Date(a.updatedAt);
        });

        const counts = {};
        
        activeItems.forEach(item => {
            const target = document.getElementById(`list-${item.status}`);
            if (target) {
                counts[item.status] = (counts[item.status] || 0) + 1;
                const el = document.createElement('div');
                el.className = 'task';
                
                // Formatação Meta
                let meta = '';
                if (item.date) meta += `📅 ${new Date(item.date).toLocaleString().slice(0,-3)} `;
                if (item.note) meta += `📝 ${item.note}`;
                
                el.innerHTML = `
                    <div class="task-content" onclick="App.editItem('${item.id}')">
                        ${item.text}
                        ${meta ? `<span class="task-meta">${meta}</span>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="btn-act" onclick="App.openContext('${item.id}')">➔</button>
                        <button class="btn-act del" onclick="App.deleteItem('${item.id}')">✕</button>
                    </div>
                `;
                target.appendChild(el);
            }
        });

        Object.keys(counts).forEach(k => {
            const b = document.getElementById(`badge-${k}`);
            if(b) b.innerText = counts[k];
        });
    },

    openConfig: () => document.getElementById('configModal').style.display = 'flex',
    closeModal: (id) => document.getElementById(id).style.display = 'none',
    
    toast: (msg) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 3000);
    }
};

// --- 6. AI ENGINE (Gemini) ---
const AI = {
    magicProcess: async () => {
        const key = Config.get('geminiKey');
        if(!key) return UI.toast("Configure a API Gemini");
        
        const inbox = Store.items.filter(i => i.status === 'inbox' && !i._deleted);
        if(inbox.length === 0) return UI.toast("Entrada vazia");
        
        UI.toast("IA Pensando... 🤖");
        
        const prompt = `
            Contexto: GTD Task Manager. Hoje: ${Utils.now()}.
            Entrada: ${JSON.stringify(inbox.map(i => ({id: i.id, text: i.text})))}
            
            Tarefa: Classifique cada item.
            Regras:
            - Data específica na frase? -> status: 'calendar', date: 'ISO String'
            - Delegar/Outra pessoa? -> status: 'waiting', note: 'Quem'
            - Ação rápida (<2min)? -> status: 'do-now'
            - Vago/Sonho? -> status: 'someday'
            - Info estática? -> status: 'reference'
            - Projeto complexo? -> status: 'project'
            - Padrão -> status: 'next'
            
            Saída: APENAS JSON Array válido: [{"id": "...", "status": "...", "date": "...", "note": "..."}]
        `;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const txt = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            const updates = JSON.parse(txt);
            
            updates.forEach(u => {
                if(u.id) Store.update(u.id, { status: u.status, date: u.date || null, note: u.note || null });
            });
            UI.toast(`IA processou ${updates.length} itens!`);
        } catch(e) {
            UI.toast("Erro IA: " + e.message);
        }
    }
};

// --- 7. APP CONTROLLER ---
const App = {
    activeId: null,

    init: () => {
        Config.load();
        Store.init();
        UI.init();
        UI.render();
        
        // Setup Sync
        Sync.trigger = Utils.debounce(() => Sync.perform(), 2000); // Wait 2s after changes
        Sync.perform(); // Initial Load
        setInterval(() => Sync.perform(), 60000); // Polling 1min para mudanças remotas
        
        // Setup Calendar
        if(Config.get('googleId')) Calendar.init();
    },

    addItem: () => {
        const inp = document.getElementById('quickInput');
        if(inp.value.trim()) {
            Store.add(inp.value.trim());
            inp.value = '';
        }
    },

    addToList: (list) => {
        const txt = prompt(`Adicionar em ${UI.names[list]}:`);
        if(txt) Store.add(txt, list);
    },

    editItem: (id) => {
        const item = Store.items.find(i => i.id === id);
        const txt = prompt("Editar:", item.text);
        if(txt && txt !== item.text) Store.update(id, { text: txt });
    },

    deleteItem: (id) => {
        if(confirm("Excluir?")) Store.delete(id);
    },

    openContext: (id) => {
        App.activeId = id;
        const div = document.getElementById('ctxButtons');
        div.innerHTML = UI.lists.map(k => 
            `<button class="full-btn" style="margin:0; background:${k===Store.items.find(i=>i.id===id).status ? '#2c3e50':'#95a5a6'}" 
             onclick="App.moveItem('${k}')">${UI.names[k]}</button>`
        ).join('');
        document.getElementById('contextModal').style.display = 'flex';
    },

    moveItem: (status) => {
        Store.update(App.activeId, { status: status });
        UI.closeModal('contextModal');
        // Se mover para calendar, pergunta data
        if(status === 'calendar') {
            const d = prompt("Data (YYYY-MM-DD HH:MM):", new Date().toISOString().slice(0,16));
            if(d) Store.update(App.activeId, { date: d });
        }
    },
    
    sync: (force) => Sync.perform(force)
};

// --- 8. GOOGLE CALENDAR ---
const Calendar = {
    client: null,
    init: () => {
        // Carregamento simples do GAPI v2 (Simplified for SFC)
