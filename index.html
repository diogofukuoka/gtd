<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <title>GTD Fukuoka v10.3 (Stable)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --bg: #f4f6f8; --card: #ffffff; --text: #2c3e50; --border: #dfe6e9; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --card: #2d3436; --text: #dfe6e9; --border: #444; } }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 80px; transition: background 0.3s; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sync-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 12px; background: #eee; color: #555; display: flex; align-items: center; gap: 5px; font-weight: 600; border: 1px solid var(--border); cursor: pointer; }
        .sync-badge.online { color: var(--success); border-color: var(--success); background: rgba(39, 174, 96, 0.1); }
        .sync-badge.syncing { color: var(--accent); border-color: var(--accent); background: rgba(52, 152, 219, 0.1); }
        .sync-badge.error { color: var(--danger); border-color: var(--danger); background: rgba(231, 76, 60, 0.1); }
        
        .input-wrapper { display: flex; gap: 8px; margin-bottom: 15px; background: var(--card); padding: 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input[type="text"] { flex: 1; border: none; font-size: 16px; background: transparent; color: var(--text); padding: 8px; }
        button { border: none; cursor: pointer; border-radius: 8px; font-weight: 600; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
        button:active { transform: scale(0.95); }
        .btn-main { background: var(--accent); color: white; width: 44px; height: 44px; font-size: 1.2rem; }
        
        .lists-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .list-column { background: var(--card); border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; max-height: 80vh; }
        .list-header { padding: 12px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); border-radius: 10px 10px 0 0; z-index: 10; cursor: pointer; user-select: none; }
        .list-body { overflow-y: auto; padding: 5px; flex-grow: 1; min-height: 50px; }
        
        .task { background: var(--bg); border: 1px solid var(--border); margin-bottom: 6px; padding: 10px; border-radius: 6px; display: flex; gap: 8px; align-items: center; animation: slideIn 0.2s; position: relative; }
        .task:hover { border-color: #ccc; }
        .seq-num { background: var(--primary); color: white; font-size: 0.7rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .task-content { flex: 1; overflow-wrap: anywhere; font-size: 0.95rem; line-height: 1.4; cursor: pointer; }
        .task-meta { font-size: 0.75rem; color: #888; margin-top: 4px; display: block; }
        
        .task-actions { display: flex; gap: 4px; opacity: 0.9; flex-direction: row; align-items: center; }
        .btn-act { width: 28px; height: 28px; border-radius: 4px; font-size: 0.8rem; background: rgba(0,0,0,0.05); color: var(--text); }
        .btn-act:hover { background: var(--accent); color: white; }
        .btn-act.del:hover { background: var(--danger); }
        .btn-order { font-size: 0.6rem; height: 20px; width: 24px; background: transparent; border: 1px solid #ddd; cursor: pointer; }
        .btn-order:hover { background: #eee; }
        .order-col { display: flex; flex-direction: column; gap: 2px; }

        .badge { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; color: #555; }
        .border-inbox { border-top: 3px solid var(--danger); }
        .border-next { border-top: 3px solid var(--success); }
        .border-waiting { border-top: 3px solid var(--warning); }
        .border-calendar { border-top: 3px solid #4285f4; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal { background: var(--card); width: 90%; max-width: 450px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin-top: 0; color: var(--text); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: #888; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .full-btn { width: 100%; padding: 12px; margin-top: 10px; background: var(--primary); color: white; }
        .spinner { width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; text-align: center; width: max-content; max-width: 90%; }
        #toast.visible { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <h2 style="margin:0; font-size:1.3rem;">GTD Fukuoka <span style="font-size:0.6em; opacity:0.6;">v10.3</span></h2>
        <div style="display:flex; gap:10px;">
            <div id="syncStatus" class="sync-badge" onclick="App.sync(true)">
                <span class="dot">●</span> <span>Offline</span>
            </div>
            <button class="btn-act" onclick="UI.openConfig()">⚙️</button>
        </div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="quickInput" placeholder="O que precisa ser feito?" onkeypress="if(event.key==='Enter') App.addItem()">
        <button class="btn-main" onclick="App.addItem()">+</button>
        <button class="btn-main" style="background:#8e44ad" onclick="AI.magicProcess()" title="Processar com IA">✨</button>
    </div>

    <div id="appGrid" class="lists-grid"></div>
</div>

<div id="configModal" class="overlay">
    <div class="modal">
        <h3>Configurações</h3>
        <p style="font-size:0.8rem; color:var(--warning)">⚠️ Tokens ofuscados localmente.</p>
        <div class="form-group"><label>GitHub User</label><input id="cfgUser"></div>
        <div class="form-group"><label>Repo Name</label><input id="cfgRepo"></div>
        <div class="form-group"><label>Token (PAT)</label><input type="password" id="cfgToken"></div>
        <div class="form-group"><label>File Path</label><input id="cfgPath" value="gtd_tasks.json"></div>
        <hr style="border:0; border-top:1px solid var(--border)">
        <div class="form-group"><label>Gemini API Key</label><input type="password" id="cfgGemini"></div>
        <div class="form-group"><label>Google Client ID</label><input id="cfgGoogle"></div>
        <div class="grid-btns">
            <button class="full-btn" style="background:#7f8c8d" onclick="UI.closeModal('configModal')">Cancelar</button>
            <button class="full-btn" style="background:var(--success)" onclick="Config.save()">Salvar</button>
        </div>
    </div>
</div>

<div id="contextModal" class="overlay">
    <div class="modal">
        <h3 id="ctxTitle">Mover Tarefa</h3>
        <div class="grid-btns" id="ctxButtons"></div>
        <button class="full-btn" style="background:transparent; color:#555; border:1px solid #ccc; margin-top:15px;" onclick="UI.closeModal('contextModal')">Fechar</button>
    </div>
</div>

<div id="toast">Notificação</div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
/** 
 * GTD FUKUOKA ENTERPRISE v10.3 - STABLE SYNC FIX
 */

const Utils = {
    uuid: () => Date.now().toString(36) + Math.random().toString(36).substr(2),
    now: () => new Date().toISOString(),
    obscure: (s) => { if(!s)return'';try{return btoa(s.split('').map(c=>String.fromCharCode(c.charCodeAt(0)^123)).join(''))}catch(e){return s} },
    reveal: (s) => { if(!s)return'';try{return atob(s).split('').map(c=>String.fromCharCode(c.charCodeAt(0)^123)).join('')}catch(e){return s} },
    debounce: (f, w) => { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => f.apply(this, a), w); }; }
};

const Config = {
    data: {},
    load: () => { const s = localStorage.getItem('gtd_cfg_v1'); Config.data = s ? JSON.parse(s) : {}; },
    save: () => {
        const d = {
            ghUser: document.getElementById('cfgUser').value.trim(),
            ghRepo: document.getElementById('cfgRepo').value.trim(),
            ghToken: Utils.obscure(document.getElementById('cfgToken').value.trim()),
            ghPath: document.getElementById('cfgPath').value.trim() || 'gtd_tasks.json',
            geminiKey: Utils.obscure(document.getElementById('cfgGemini').value.trim()),
            googleId: document.getElementById('cfgGoogle').value.trim()
        };
        localStorage.setItem('gtd_cfg_v1', JSON.stringify(d)); Config.data = d; location.reload();
    },
    get: (k) => k.includes('Token')||k.includes('Key') ? Utils.reveal(Config.data[k]) : Config.data[k]
};

const Store = {
    items: [],
    sha: null,
    
    init: () => {
        const l = localStorage.getItem('gtd_items');
        Store.items = l ? JSON.parse(l) : [];
        Store.sha = localStorage.getItem('gtd_sha');
        
        // CORREÇÃO: Garante que todos os itens tenham 'order'
        let fixed = false;
        Store.items.forEach((item, idx) => {
            if (typeof item.order === 'undefined') {
                item.order = idx * 1000;
                fixed = true;
            }
        });
        if(fixed) Store.persist();
    },
    
    merge: (remote) => {
        let changes = 0;
        const map = new Map(Store.items.map(i => [i.id, i]));
        
        remote.forEach(r => {
            const l = map.get(r.id);
            // Se local não existe ou remoto é mais novo
            if (!l || new Date(r.updatedAt) > new Date(l.updatedAt)) { 
                map.set(r.id, r); 
                changes++; 
            }
        });
        
        Store.items = Array.from(map.values()).filter(i => !i._deleted || (new Date()-new Date(i.updatedAt)<86400000));
        Store.persist();
        return changes > 0;
    },

    add: (text, status = 'inbox') => {
        // Encontra o maior order atual
        const maxOrder = Store.items.reduce((max, i) => (i.order && i.order > max) ? i.order : max, 0);
        Store.items.push({ id: Utils.uuid(), text, status, order: maxOrder + 1000, updatedAt: Utils.now(), createdAt: Utils.now() });
        Store.persist(); Sync.trigger();
    },
    update: (id, pl) => {
        const i = Store.items.findIndex(x => x.id === id);
        if (i > -1) { Store.items[i] = { ...Store.items[i], ...pl, updatedAt: Utils.now() }; Store.persist(); Sync.trigger(); }
    },
    delete: (id) => {
        const i = Store.items.findIndex(x => x.id === id);
        if (i > -1) { Store.items[i]._deleted = true; Store.items[i].updatedAt = Utils.now(); Store.persist(); Sync.trigger(); }
    },
    persist: () => {
        localStorage.setItem('gtd_items', JSON.stringify(Store.items));
        if(Store.sha) localStorage.setItem('gtd_sha', Store.sha);
        UI.render();
    }
};

const Sync = {
    status: 'offline',
    setStatus: (s, m) => {
        const el = document.getElementById('syncStatus'); if(!el) return;
        if(s === 'syncing') { el.innerHTML = '<span class="spinner"></span> Sync...'; el.className = 'sync-badge syncing'; }
        else if(s === 'online') { el.innerHTML = '<span class="dot" style="color:var(--success)">●</span> Online'; el.className = 'sync-badge online'; }
        else if(s === 'error') { el.innerHTML = `<span class="dot" style="color:var(--danger)">●</span> ${m||'Erro'}`; el.className = 'sync-badge error'; }
        else { el.innerHTML = '<span class="dot">●</span> Offline'; el.className = 'sync-badge'; }
    },
    trigger: null,
    
    perform: async (force = false) => {
        const token = Config.get('ghToken');
        const user = Config.get('ghUser');
        const repo = Config.get('ghRepo');
        const path = Config.get('ghPath') || 'gtd_tasks.json';

        if (!token || !user || !repo) return Sync.setStatus('offline');
        
        Sync.setStatus('syncing');
        
        try {
            // 1. GET Remoto
            const getUrl = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
            const res = await fetch(getUrl, { 
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Cache-Control': 'no-cache' } 
            });
            
            let remoteItems = [];
            let remoteSha = null;
            let needsCreation = false;

            if (res.status === 200) {
                const data = await res.json();
                remoteSha = data.sha;
                remoteItems = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            } else if (res.status === 404) {
                needsCreation = true;
            } else {
                if(res.status === 401) throw new Error("401 Token Inválido");
                if(res.status === 403) throw new Error("403 Permissão Negada");
                throw new Error(`Erro GitHub ${res.status}`);
            }
            
            // 2. MERGE
            Store.merge(remoteItems);
            Store.sha = remoteSha; // Atualiza o SHA local com o que veio do servidor

            // 3. PUT (Salvar)
            // Calculamos as strings para comparar se houve mudança real
            const localStr = JSON.stringify(Store.items);
            const remoteStr = JSON.stringify(remoteItems);
            
            if (needsCreation || localStr !== remoteStr || force) {
                const putBody = {
                    message: "GTD Sync " + Utils.now(),
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(Store.items, null, 2)))),
                    sha: remoteSha 
                };

                const putRes = await fetch(getUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(putBody)
                });

                if (putRes.ok) {
                    const putData = await putRes.json();
                    Store.sha = putData.content.sha;
                    Store.persist();
                    Sync.setStatus('online');
                    if(needsCreation) UI.toast("Arquivo criado!");
                } else if (putRes.status === 409) {
                    console.warn("Conflito SHA. Tentando novamente...");
                    // Retry automático
                    setTimeout(() => Sync.perform(true), 1500);
                } else {
                    const txt = await putRes.text();
                    throw new Error(`Save ${putRes.status}: ${txt}`);
                }
            } else {
                Sync.setStatus('online');
            }

        } catch (e) {
            console.error(e);
            Sync.setStatus('error', e.message.substring(0, 15));
            UI.toast("Erro Sync: " + e.message);
        }
    }
};

const UI = {
    lists: ['inbox', 'do-now', 'next', 'waiting', 'calendar', 'project', 'someday', 'reference'],
    names: { 'inbox': '📥 Entrada', 'do-now': '⚡ Fazer Agora', 'next': '🔥 Próximas', 'waiting': '⏳ Delegado', 'calendar': '📅 Agenda', 'project': '📂 Projetos', 'someday': '💡 Talvez', 'reference': '📚 Ref.' },
    init: () => {
        const g = document.getElementById('appGrid'); g.innerHTML = '';
        UI.lists.forEach(k => {
            const c = document.createElement('div'); c.className = `list-column border-${k}`;
            c.innerHTML = `<div class="list-header" onclick="App.addToList('${k}')">${UI.names[k]} <span class="badge" id="badge-${k}">0</span></div><div class="list-body" id="list-${k}"></div>`;
            g.appendChild(c);
        });
        if(Config.get('ghUser')) { document.getElementById('cfgUser').value = Config.get('ghUser'); document.getElementById('cfgRepo').value = Config.get('ghRepo'); document.getElementById('cfgToken').value = Config.get('ghToken'); document.getElementById('cfgGemini').value = Config.get('geminiKey')||''; document.getElementById('cfgGoogle').value = Config.get('googleId')||''; }
        else UI.openConfig();
    },
    render: () => {
        UI.lists.forEach(k => { document.getElementById(`list-${k}`).innerHTML = ''; document.getElementById(`badge-${k}`).innerText = '0'; });
        const items = Store.items.filter(i => !i._deleted);
        
        items.sort((a,b) => {
            // Ordenação especial para Next (Campo order)
            if(a.status === 'next' && b.status === 'next') {
                return (a.order || 0) - (b.order || 0);
            }
            // Calendário por Data
            if(a.status === 'calendar' && a.date && b.date) return new Date(a.date) - new Date(b.date);
            // Padrão: Mais recente primeiro
            return new Date(b.updatedAt) - new Date(a.updatedAt);
        });

        const counts = {};
        let seqCounter = 1;

        items.forEach(item => {
            const t = document.getElementById(`list-${item.status}`);
            if (t) {
                counts[item.status] = (counts[item.status] || 0) + 1;
                const el = document.createElement('div');
                el.className = 'task';
                let meta = '';
                if (item.date) meta += `📅 ${new Date(item.date).toLocaleString().slice(0,-3)} `;
                if (item.note) meta += `📝 ${item.note}`;
                
                let orderControls = '';
                let seqBadge = '';
                
                // Controles de Ordenação apenas na lista 'next'
                if (item.status === 'next') {
                    seqBadge = `<div class="seq-num">${seqCounter++}</div>`;
                    orderControls = `
                        <div class="order-col">
                            <button class="btn-order" onclick="event.stopPropagation(); App.reorder('${item.id}', -1)">▲</button>
                            <button class="btn-order" onclick="event.stopPropagation(); App.reorder('${item.id}', 1)">▼</button>
                        </div>
                    `;
                }

                el.innerHTML = `
                    ${seqBadge}
                    <div class="task-content" onclick="App.editItem('${item.id}')">${item.text}${meta ? `<span class="task-meta">${meta}</span>` : ''}</div>
                    <div class="task-actions">
                        ${orderControls}
                        <button class="btn-act" onclick="App.openContext('${item.id}')">➔</button>
                        <button class="btn-act del" onclick="App.deleteItem('${item.id}')">✕</button>
                    </div>
                `;
                t.appendChild(el);
            }
        });
        Object.keys(counts).forEach(k => { const b = document.getElementById(`badge-${k}`); if(b) b.innerText = counts[k]; });
    },
    openConfig: () => document.getElementById('configModal').style.display = 'flex',
    closeModal: (id) => document.getElementById(id).style.display = 'none',
    toast: (m) => { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 3000); }
};

const AI = {
    magicProcess: async () => {
        const k = Config.get('geminiKey'); if(!k) return UI.toast("Falta API Key");
        const inbox = Store.items.filter(i => i.status === 'inbox' && !i._deleted);
        if(!inbox.length) return UI.toast("Inbox vazia");
        UI.toast("IA Pensando...");
        const p = `GTD Task processing. Now: ${Utils.now()}. Input: ${JSON.stringify(inbox.map(i=>({id:i.id,text:i.text})))}. Rules: Date->calendar+date; Delegate->waiting+note; <2min->do-now; Vague->someday; Ref->reference; Project->project; Default->next. Output JSON Array: [{"id":"...","status":"...","date":"...","note":"..."}]`;
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${k}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ contents:[{parts:[{text:p}]}]})});
            const d = await r.json();
            const txt = d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
            JSON.parse(txt).forEach(u => Store.update(u.id, {status:u.status, date:u.date||null, note:u.note||null}));
            UI.toast("Processamento Concluído!");
        } catch(e) { UI.toast("Erro IA: "+e.message); }
    }
};

const App = {
    activeId: null,
    init: () => { Config.load(); Store.init(); UI.init(); UI.render(); Sync.trigger = Utils.debounce(()=>Sync.perform(), 2000); Sync.perform(); setInterval(()=>Sync.perform(), 60000); },
    addItem: () => { const i = document.getElementById('quickInput'); if(i.value.trim()){ Store.add(i.value.trim()); i.value=''; } },
    addToList: (l) => { const t = prompt(`Add em ${UI.names[l]}:`); if(t) Store.add(t, l); },
    editItem: (id) => { const i = Store.items.find(x=>x.id===id); const t = prompt("Editar:", i.text); if(t && t!==i.text) Store.update(id, {text:t}); },
    deleteItem: (id) => { if(confirm("Excluir?")) Store.delete(id); },
    openContext: (id) => { App.activeId = id; document.getElementById('ctxButtons').innerHTML = UI.lists.map(k => `<button class="full-btn" style="margin:0; background:${k===Store.items.find(i=>i.id===id).status ? '#2c3e50':'#95a5a6'}" onclick="App.moveItem('${k}')">${UI.names[k]}</button>`).join(''); document.getElementById('contextModal').style.display = 'flex'; },
    moveItem: (s) => { Store.update(App.activeId, {status:s}); UI.closeModal('contextModal'); if(s==='calendar'){const d=prompt("Data (YYYY-MM-DD HH:MM):",new Date().toISOString().slice(0,16));if(d)Store.update(App.activeId,{date:d});} },
    sync: (f) => Sync.perform(f),
    
    // REORDER (Lógica Fixada)
    reorder: (id, dir) => {
        // Pega apenas itens Next e ordena visualmente
        const list = Store.items
            .filter(i => i.status === 'next' && !i._deleted)
            .sort((a,b) => (a.order||0) - (b.order||0));
            
        const idx = list.findIndex(i => i.id === id);
        if (idx === -1) return;
        
        const targetIdx = idx + dir;
        if (targetIdx >= 0 && targetIdx < list.length) {
            const currentItem = list[idx];
            const swapItem = list[targetIdx];
            
            // Troca os valores de ordem
            const tempOrder = currentItem.order || 0;
            const targetOrder = swapItem.order || 0;
            
            // Evita colisão se ambos forem iguais (zero)
            if (tempOrder === targetOrder) {
                Store.update(currentItem.id, { order: tempOrder + dir });
            } else {
                Store.update(currentItem.id, { order: targetOrder });
                Store.update(swapItem.id, { order: tempOrder });
            }
        }
    }
};

window.onload = App.init;
