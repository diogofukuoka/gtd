<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTD Fukuoka</title>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --google: #4285f4; --gray: #95a5a6; --ai: #8e44ad; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #333; margin: 0; padding: 15px; padding-bottom: 80px; user-select: none; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        
        .status-bar { background: #f8f9fa; border: 1px solid #e9ecef; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display:inline-block; margin-right:5px; }
        .dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot.syncing { background: var(--warning); animation: pulse 1s infinite; }
        .dot.error { background: var(--danger); }
        
        button { padding: 0 15px; height: 40px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        .btn-config { background: white; border: 1px solid #ccc; color: #333; font-size: 0.85rem; }
        .btn-add { background: var(--accent); color: white; min-width: 50px; font-size: 1.2rem; height: 46px; }
        .btn-mic { background: #607d8b; color: white; min-width: 46px; font-size: 1.2rem; height: 46px; }
        .btn-mic.listening { background: #e74c3c; animation: pulse-red 1.5s infinite; }
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; }
        input[type="text"], input[type="datetime-local"], input[type="password"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }

        .lists-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 700px) { .lists-grid { grid-template-columns: 1fr 1fr; } }
        .list-card { background-color: #f1f3f5; border: 1px solid #ced4da; border-radius: 8px; padding: 15px; min-height: 100px; display: flex; flex-direction: column; }
        .list-card.drag-over { background-color: #e3f2fd; border: 2px dashed #3498db; }
        .list-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #dee2e6; padding-bottom: 8px; margin-bottom: 10px; cursor: pointer; }
        .list-header h3 { margin: 0; font-size: 1rem; }
        .list-header:active { opacity: 0.6; background-color: #e9ecef; border-radius: 4px; }
        .badge { background: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; border: 1px solid #ccc; }
        
        .card-inbox { border-top: 4px solid var(--danger); }
        .card-next { border-top: 4px solid var(--success); }
        .card-waiting { border-top: 4px solid var(--warning); }
        .card-projects { border-top: 4px solid var(--primary); }
        .card-calendar { border-top: 4px solid var(--google); }
        .card-completed { border-top: 4px solid var(--gray); opacity: 0.8; }
        .card-do-now { background-color: #fff3cd !important; border: 1px solid #ffeeba !important; }

        ul { list-style: none; padding: 0; margin: 0; min-height: 50px; flex-grow: 1; }
        li { padding: 8px 10px; border: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; background: #ffffff; border-radius: 6px; margin-bottom: 6px; touch-action: pan-y; position: relative; gap: 8px; }
        li.ready-to-drag { background-color: #e3f2fd; border: 2px solid #3498db; transform: scale(1.02); z-index: 50; }
        li.dragging { opacity: 0.4; }
        
        .task-content { flex: 1; display: flex; flex-direction: column; cursor: default; padding: 5px 0; }
        .task-text { font-weight: 400; font-size: 1rem; color: #2c3e50; }
        .meta { font-size: 0.75rem; color: #666; display: block; margin-top: 2px; pointer-events: none; }
        
        .task-actions { display: flex; gap: 4px; align-items: center; }
        .btn-icon { background: none; border: none; padding: 0; font-size: 1.1rem; cursor: pointer; border-radius: 4px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .btn-icon:hover { background-color: #f1f3f5; }
        .btn-icon.del:hover { color: var(--danger); background-color: #ffebee; }
        .btn-icon.edit:hover { color: var(--accent); background-color: #e3f2fd; }
        .btn-icon.ai:hover { color: var(--ai); background-color: #f3e5f5; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 10px; }
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        #loadingOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GTD Fukuoka</h1>
        <div class="status-bar">
            <div><div id="driveDot" class="dot"></div><span id="driveStatus">Off</span></div>
            <div>
                <button class="btn-config" onclick="manualSync()">☁️ Sync Agora</button>
                <button class="btn-config" onclick="openConfig()">⚙️ Config</button>
            </div>
        </div>
    </header>

    <div class="input-group">
        <input type="text" id="inboxInput" placeholder="Nova tarefa..." onkeypress="if(event.key==='Enter') addToInbox()">
        <button class="btn-mic" id="voiceBtn" onclick="toggleVoice()">🎤</button>
        <button class="btn-add" onclick="addToInbox()">+</button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="startProcessing()" id="btnProcess" class="btn-config hidden" style="flex:1; background:var(--primary); color:white;">⚡ Processar (<span id="inboxCount">0</span>)</button>
        <button onclick="magicProcess()" id="btnMagic" class="btn-config hidden" style="flex:1; background:linear-gradient(135deg, #8e44ad, #3498db); color:white;">✨ Auto-IA</button>
    </div>

    <div id="processing-zone" style="display:none; border:2px solid var(--accent); padding:15px; border-radius:10px; margin-bottom:20px;">
        <h3 id="currentItem" style="margin-top:0; background:#fff8e1; padding:10px; border-left:4px solid var(--warning);"></h3>
        <div id="step-1">
            <p>É passível de ação?</p>
            <div style="display:flex; gap:10px;"><button class="btn-config" style="background:var(--danger); color:white; flex:1" onclick="handleActionable(false)">Não</button><button class="btn-config" style="background:var(--success); color:white; flex:1" onclick="handleActionable(true)">Sim</button></div>
        </div>
    </div>

    <div class="lists-grid"></div>
</div>

<div id="moveModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Mover tarefa para:</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <button class="btn-config" onclick="finalizeCtx('inbox')">📥 Entrada</button>
            <button class="btn-config" onclick="finalizeCtx('do-now')">⚡ Agora</button>
            <button class="btn-config" onclick="finalizeCtx('next')">🔥 Próx. Ações</button>
            <button class="btn-config" onclick="finalizeCtx('project')">📂 Projetos</button>
            <button class="btn-config" onclick="finalizeCtx('calendar')">📅 Calendário</button>
            <button class="btn-config" onclick="finalizeCtx('waiting')">⏳ Delegar</button>
            <button class="btn-config" onclick="finalizeCtx('someday')">💡 Talvez</button>
            <button class="btn-config" onclick="finalizeCtx('reference')">📚 Ref.</button>
            <button class="btn-config" onclick="finalizeCtx('completed')">✅ Feito</button>
        </div>
        <button class="btn-config" style="width:100%; margin-top:10px;" onclick="document.getElementById('moveModal').style.display='none'">Cancelar</button>
    </div>
</div>

<div id="configModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Configurações</h3>
        <label>Google Client ID:</label><input type="text" id="cfgClientId">
        <button onclick="handleAuthClick()" style="width:100%; margin:10px 0; background:var(--google); color:white;">Conectar Google Drive</button>
        <label>Gemini API Key (IA):</label><input type="password" id="cfgGemini">
        <div style="text-align:right; margin-top:15px;">
            <button class="btn-config" onclick="closeConfig()">Fechar</button>
            <button class="btn-config" style="background:var(--success); color:white;" onclick="saveConfig()">Salvar</button>
        </div>
    </div>
</div>

<div id="dateModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Escolha a Data</h3>
        <input type="datetime-local" id="modalDateInput">
        <div style="margin-top:10px; text-align:right;">
            <button class="btn-config" onclick="resolveDate(null)">Cancelar</button>
            <button class="btn-config" style="background:var(--success); color:white;" onclick="resolveDate(document.getElementById('modalDateInput').value)">Confirmar</button>
        </div>
    </div>
</div>

<div id="loadingOverlay"><div class="spinner"></div><p style="margin-top:10px">Processando...</p></div>
<div id="toast">Notificação</div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script>
    // --- ESTADO & CONFIG ---
    let items = JSON.parse(localStorage.getItem('gtd_data')) || [];
    let config = JSON.parse(localStorage.getItem('gtd_config')) || { googleClientId: '', geminiKey: '' };
    
    const listNames = {
        'inbox': '📥 Entrada', 'do-now': '⚡ Fazer Agora', 'next': '🔥 Próximas Ações',
        'project': '📂 Projetos', 'calendar': '📅 Calendário', 'waiting': '⏳ Delegar',
        'someday': '💡 Talvez', 'reference': '📚 Referência', 'completed': '✅ Concluídas'
    };

    let activeItemIdx = null; 
    let autoSyncInterval;
    let syncInProgress = false;
    
    // --- GOOGLE API ---
    let tokenClient;
    let driveFileId = localStorage.getItem('gtd_drive_file_id');
    const SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/drive.appdata';
    const DB_NAME = 'gtd_fukuoka_v7_db.json';

    window.onload = () => {
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest', 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
            checkAuth();
        });
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: config.googleClientId, scope: SCOPES,
            callback: (resp) => {
                if(resp.error) return;
                const exp = Date.now() + (resp.expires_in * 1000);
                localStorage.setItem('gtd_token', JSON.stringify({ token: resp.access_token, exp: exp }));
                gapi.client.setToken(resp);
                updateStatus(true);
                initDrive(true); 
                startAutoSync();
            }
        });
        render();
    };

    function checkAuth() {
        const stored = JSON.parse(localStorage.getItem('gtd_token'));
        if(stored && Date.now() < stored.exp) {
            gapi.client.setToken({ access_token: stored.token });
            updateStatus(true);
            if(!driveFileId) initDrive(true); else { manualSync(); startAutoSync(); }
        }
    }
    
    function handleAuthClick() {
        if(!config.googleClientId) return alert("Salve o Client ID primeiro.");
        tokenClient.requestAccessToken({prompt: ''});
    }

    function updateStatus(online) {
        document.getElementById('driveDot').className = online ? 'dot online' : 'dot';
        document.getElementById('driveStatus').innerText = online ? 'Online' : 'Off';
    }

    // --- DRIVE & SYNC (MERGE) ---
    async function initDrive(forceSearch = false) {
        if(!gapi.client.getToken()) return;
        try {
            const list = await gapi.client.drive.files.list({ 
                spaces: 'appDataFolder', q: `name = '${DB_NAME}' and trashed = false`, fields: 'files(id)' 
            });
            if(list.result.files.length > 0) {
                driveFileId = list.result.files[0].id;
                localStorage.setItem('gtd_drive_file_id', driveFileId);
                driveSync(true); 
            } else {
                const create = await gapi.client.drive.files.create({
                    resource: { name: DB_NAME, parents: ['appDataFolder'] },
                    media: { mimeType: 'application/json', body: JSON.stringify(items) }
                });
                driveFileId = create.result.id;
                localStorage.setItem('gtd_drive_file_id', driveFileId);
            }
        } catch(e) { console.error(e); }
    }

    async function driveSync(download = false) {
        if(!driveFileId || !gapi.client.getToken() || syncInProgress) return;
        syncInProgress = true;
        document.getElementById('driveDot').className = 'dot syncing';
        
        try {
            if(download) {
                const res = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
                const remoteData = res.result || res.body;
                if(Array.isArray(remoteData)) { 
                    mergeLists(remoteData);
                    render();
                    await checkRemoteCalendarDeletions();
                }
            } else {
                const body = JSON.stringify(items);
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}`, 'Content-Type': 'application/json' },
                    body: body
                });
            }
            document.getElementById('driveDot').className = 'dot online';
        } catch(e) { console.error(e); document.getElementById('driveDot').className = 'dot error'; } 
        finally { syncInProgress = false; }
    }

    function mergeLists(remoteItems) {
        const itemMap = new Map();
        items.forEach(i => itemMap.set(i.id, i));
        let hasChanges = false;
        remoteItems.forEach(remote => {
            if (itemMap.has(remote.id)) {
                const local = itemMap.get(remote.id);
                if ((remote.updatedAt || 0) > (local.updatedAt || 0)) itemMap.set(remote.id, remote);
            } else itemMap.set(remote.id, remote);
        });
        const newItems = Array.from(itemMap.values());
        if (JSON.stringify(newItems) !== JSON.stringify(items) || newItems.length !== remoteItems.length) hasChanges = true;
        items = newItems;
        localStorage.setItem('gtd_data', JSON.stringify(items));
        if(hasChanges) setTimeout(() => driveSync(false), 1000);
    }

    function sync() {
        localStorage.setItem('gtd_data', JSON.stringify(items));
        render();
        if(window.syncTimer) clearTimeout(window.syncTimer);
        window.syncTimer = setTimeout(() => driveSync(false), 500); 
    }
    
    function manualSync() { driveSync(true); }
    
    function startAutoSync() {
        if(autoSyncInterval) clearInterval(autoSyncInterval);
        autoSyncInterval = setInterval(() => {
            if(gapi.client.getToken()) driveSync(true); 
        }, 15000);
    }

    function updateItemTimestamp(item) { item.updatedAt = Date.now(); }

    // --- CALENDAR ---
    async function checkRemoteCalendarDeletions() {
        if(!config.googleClientId || !gapi.client.getToken()) return;
        let changed = false;
        const syncedItems = items.filter(i => (i.status === 'calendar' || i.status === 'waiting') && i.googleEventId);

        for (const item of syncedItems) {
            try {
                const res = await gapi.client.calendar.events.get({ calendarId: 'primary', eventId: item.googleEventId });
                if (res.result.status === 'cancelled') { deleteLocalTask(item); changed = true; }
            } catch (err) {
                if (err.status === 404 || err.status === 410) { deleteLocalTask(item); changed = true; }
            }
        }
        if (changed) sync(); 
    }

    function deleteLocalTask(item) {
        const idx = items.indexOf(item);
        if(idx > -1) items.splice(idx, 1);
    }

    async function handleCalendarEvents(item, oldStatus, newStatus) {
        if(!config.googleClientId || !gapi.client.getToken()) return;

        if ((oldStatus === 'calendar' || oldStatus === 'waiting') && (newStatus !== 'calendar' && newStatus !== 'waiting')) {
            if (item.googleEventId) delete item.googleEventId;
        }

        if ((newStatus === 'calendar' || newStatus === 'waiting') && item.date) {
            updateItemTimestamp(item);
            try {
                const start = new Date(item.date);
                const end = new Date(start.getTime() + 30 * 60000); 
                const event = {
                    summary: `GTD: ${item.text} ${newStatus === 'waiting' ? '(Delegado)' : ''}`,
                    description: item.note || '',
                    start: { dateTime: start.toISOString() },
                    end: { dateTime: end.toISOString() }
                };
                
                if(item.googleEventId) {
                    try {
                        await gapi.client.calendar.events.update({ calendarId: 'primary', eventId: item.googleEventId, resource: event });
                    } catch {
                         const res = await gapi.client.calendar.events.insert({ calendarId: 'primary', resource: event });
                         item.googleEventId = res.result.id;
                    }
                } else {
                    const res = await gapi.client.calendar.events.insert({ calendarId: 'primary', resource: event });
                    item.googleEventId = res.result.id;
                }
            } catch(e) { console.error("Erro Agenda:", e); }
        }
    }

    // --- INTERAÇÕES ---
    let longPressTimer;
    
    function startMovePress(idx) {
        longPressTimer = setTimeout(() => {
            activeItemIdx = idx;
            document.getElementById('moveModal').style.display = 'flex';
            if(navigator.vibrate) navigator.vibrate(50);
        }, 500);
    }

    function startListTitlePress(listKey) {
        longPressTimer = setTimeout(async () => {
            if(navigator.vibrate) navigator.vibrate(50);
            const listName = listNames[listKey];
            const text = prompt(`Adicionar nova tarefa em "${listName}":`);
            
            if(text) {
                const newItem = { id: Date.now(), text: text, status: listKey, updatedAt: Date.now() };
                if (listKey === 'calendar' || listKey === 'waiting') {
                    const dateStr = await askDate();
                    if(dateStr) {
                        newItem.date = dateStr;
                        if(listKey === 'waiting') {
                            const note = prompt("Delegar para quem?");
                            if(note) newItem.note = "Delegado: " + note;
                        }
                        items.push(newItem);
                        await handleCalendarEvents(newItem, null, listKey);
                    } else return;
                } else {
                    items.push(newItem);
                }
                sync();
            }
        }, 600);
    }

    async function triggerEdit(idx) {
        activeItemIdx = idx;
        const item = items[idx];
        const newTxt = prompt("Editar Título da Tarefa:", item.text);
        if(newTxt && newTxt !== item.text) { 
            item.text = newTxt; 
            updateItemTimestamp(item);
            if(item.status === 'calendar' || item.status === 'waiting') {
                await handleCalendarEvents(item, item.status, item.status);
            }
            sync(); 
        }
    }

    function editItemClick(e, idx) { e.stopPropagation(); triggerEdit(idx); }
    function cancelPress() { clearTimeout(longPressTimer); }

    async function breakdownItem(e, idx) {
        e.stopPropagation();
        if(!config.geminiKey) return alert("Configure a API Key do Gemini.");
        document.getElementById('loadingOverlay').style.display = 'flex';
        const item = items[idx];
        const prompt = `Quebre a tarefa "${item.text}" em etapas acionáveis. Retorne JSON Array strings.`;
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${config.geminiKey}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const txt = data.candidates[0].content.parts[0].text;
            const steps = JSON.parse(txt.replace(/```json|```/g, '').trim());
            steps.forEach(step => items.push({ 
                id: Date.now() + Math.random(), 
                text: step, 
                status: 'next', 
                note: `De: ${item.text}`,
                updatedAt: Date.now() 
            }));
            sync();
            showToast("Tarefas criadas!");
        } catch(e) { alert("Erro IA: " + e); }
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    function deleteItem(e, idx) {
        e.stopPropagation();
        if(confirm("Excluir tarefa?")) {
            const item = items[idx];
            handleCalendarEvents(item, item.status, 'trash'); 
            items.splice(idx, 1);
            sync();
        }
    }
    
    async function finalizeCtx(newStatus) {
        document.getElementById('moveModal').style.display = 'none';
        const item = items[activeItemIdx];
        await changeItemStatus(item, newStatus);
    }

    async function drop(ev, newStatus) {
        ev.preventDefault();
        ev.currentTarget.classList.remove('drag-over');
        const idx = ev.dataTransfer.getData("text");
        if(idx !== "") { await changeItemStatus(items[idx], newStatus); }
    }
    function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }

    async function changeItemStatus(item, newStatus) {
        const oldStatus = item.status;
        item.updatedAt = Date.now();
        if(newStatus === 'completed') item.completedAt = new Date().toISOString();
        else delete item.completedAt;

        if(newStatus === 'calendar' || newStatus === 'waiting') {
            const dateStr = await askDate();
            if(!dateStr) return; 
            item.date = dateStr;
            if(newStatus === 'waiting') {
                const note = prompt("Delegar para quem?");
                if(note) item.note = "Delegado: " + note;
            }
        }
        await handleCalendarEvents(item, oldStatus, newStatus);
        item.status = newStatus;
        sync();
    }

    let dateRes;
    function askDate() { return new Promise(r => { document.getElementById('dateModal').style.display='flex'; dateRes = r; }); }
    function resolveDate(val) { document.getElementById('dateModal').style.display='none'; dateRes(val); }

    // --- RENDER ---
    function render() {
        const listKeys = ['inbox','do-now','next','project','calendar','waiting','someday','reference','completed'];
        const grid = document.querySelector('.lists-grid');
        grid.innerHTML = ''; 
        const counts = {};
        
        listKeys.forEach(key => {
            counts[key] = 0;
            const card = document.createElement('div');
            card.className = `list-card card-${key}`;
            if(key === 'completed') card.style.gridColumn = '1 / -1';
            card.ondrop = (e) => drop(e, key);
            card.ondragover = (e) => allowDrop(e);

            const headerHtml = `
                <div class="list-header" 
                     onmousedown="startListTitlePress('${key}')" ontouchstart="startListTitlePress('${key}')"
                     onmouseup="cancelPress()" ontouchend="cancelPress()" onmouseleave="cancelPress()" ontouchmove="cancelPress()">
                    <h3>${listNames[key]}</h3>
                    <div>
                        ${key === 'completed' ? `<button class="btn-config" onclick="clearCompletedHistory()" style="font-size:0.7rem; padding:2px 5px;">🗑️</button>` : ''}
                        <span class="badge" id="c-${key}">0</span>
                    </div>
                </div>
                <ul id="l-${key}"></ul>
            `;
            card.innerHTML = headerHtml;
            grid.appendChild(card);
        });

        items.forEach((item, idx) => {
            const ul = document.getElementById('l-'+item.status);
            if(ul) {
                counts[item.status]++;
                const li = document.createElement('li');
                li.draggable = true;
                li.ondragstart = (e) => e.dataTransfer.setData("text", idx);
                li.onmousedown = () => startMovePress(idx);
                li.ontouchstart = () => startMovePress(idx);
                li.onmouseup = cancelPress; li.ontouchend = cancelPress; li.onmouseleave = cancelPress; li.ontouchmove = cancelPress;
                li.oncontextmenu = (e) => e.preventDefault(); 

                let meta = "";
                if(item.note) meta += `<span class="meta">${item.note}</span>`;
                if(item.date && (item.status === 'calendar' || item.status === 'waiting')) {
                    const d = new Date(item.date);
                    meta += `<span class="meta">📅 ${d.toLocaleString()} ${item.googleEventId ? '✅' : ''}</span>`;
                }
                if(item.status === 'completed' && item.completedAt) {
                    const d = new Date(item.completedAt);
                    meta += `<span class="meta" style="color:var(--success)">Feito: ${d.toLocaleString()}</span>`;
                }

                li.innerHTML = `
                    <div class="task-content">
                        <span class="task-text">${item.text}</span>
                        ${meta}
                    </div>
                    <div class="task-actions">
                        <button class="btn-icon edit" title="Editar" onmousedown="editItemClick(event, ${idx})">✏️</button>
                        <button class="btn-icon ai" title="Desmembrar (IA)" onmousedown="breakdownItem(event, ${idx})">🤖</button>
                        <button class="btn-icon del" title="Excluir" onmousedown="deleteItem(event, ${idx})">🗑️</button>
                    </div>
                `;
                ul.appendChild(li);
            }
        });

        listKeys.forEach(l => {
             const badge = document.getElementById('c-'+l);
             if(badge) badge.innerText = counts[l];
        });
        
        document.getElementById('inboxCount').innerText = counts['inbox'];
        
        if(counts['inbox'] > 0) {
            document.getElementById('btnProcess').classList.remove('hidden');
            document.getElementById('btnMagic').classList.remove('hidden');
        } else {
            document.getElementById('btnProcess').classList.add('hidden');
            document.getElementById('btnMagic').classList.add('hidden');
            document.getElementById('processing-zone').style.display = 'none';
        }
    }

    function addToInbox() {
        const val = document.getElementById('inboxInput').value;
        if(val) { items.push({id:Date.now(), text:val, status:'inbox', updatedAt:Date.now()}); document.getElementById('inboxInput').value=''; sync(); }
    }
    
    let procIdx = null;
    function startProcessing() {
        procIdx = items.findIndex(i => i.status === 'inbox');
        if(procIdx > -1) {
            document.getElementById('processing-zone').style.display = 'block';
            document.getElementById('currentItem').innerText = items[procIdx].text;
            activeItemIdx = procIdx; 
        }
    }
    function handleActionable(bool) {
        if(!bool) { 
            if(confirm("É Lixo? (Cancelar para Talvez/Ref)")) { changeItemStatus(items[procIdx], 'trash'); } 
            else { changeItemStatus(items[procIdx], 'someday'); } 
        } else {
            document.getElementById('moveModal').style.display = 'flex';
        }
    }

    function openConfig() { 
        document.getElementById('cfgClientId').value = config.googleClientId || ''; 
        document.getElementById('cfgGemini').value = config.geminiKey || '';
        document.getElementById('configModal').style.display = 'flex'; 
    }
    function closeConfig() { document.getElementById('configModal').style.display = 'none'; }
    function saveConfig() {
        config.googleClientId = document.getElementById('cfgClientId').value;
        config.geminiKey = document.getElementById('cfgGemini').value;
        localStorage.setItem('gtd_config', JSON.stringify(config));
        closeConfig(); location.reload();
    }
    function showToast(msg) { 
        const t = document.getElementById('toast'); 
        t.innerText = msg; t.className = 'show'; 
        setTimeout(() => t.className = '', 3000); 
    }
    function clearCompletedHistory() { if(confirm("Limpar histórico?")) { items = items.filter(i=>i.status!=='completed'); sync(); } }
</script>
</body>
</html>
