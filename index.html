<script>
/**
 * GTD Fukuoka v10.1 - Fix Sequencing
 */

// --- 1. CONFIG & STATE ---
const State = {
    items: [],
    config: {},
    history: [],
    ghSha: null,
    isSyncing: false,
    listDefinitions: {
        'inbox': { title: '📥 Entrada', class: 'border-inbox' },
        'do-now': { title: '⚡ Fazer Agora', class: 'border-next' },
        'next': { title: '🔥 Próximas Ações', class: 'border-next', sequenced: true },
        'project': { title: '📂 Projetos', class: 'border-project' },
        'calendar': { title: '📅 Calendário', class: 'border-calendar' },
        'waiting': { title: '⏳ Aguardando', class: 'border-waiting' },
        'someday': { title: '💡 Talvez / Algum Dia', class: 'border-project' },
        'reference': { title: '📚 Referência', class: 'border-project' },
        'completed': { title: '✅ Concluídas', class: 'border-completed' }
    },
    temp: { activeIdx: null, dateResolver: null, procIdx: null }
};

// --- 2. STORAGE & GITHUB ---
const Storage = {
    init: async () => {
        State.config = JSON.parse(localStorage.getItem('gtd_config')) || {};
        State.history = JSON.parse(localStorage.getItem('gtd_history')) || [];
        State.items = JSON.parse(localStorage.getItem('gtd_data')) || [];
        
        UI.render();
        await Storage.syncGitHub(true);
        setInterval(() => { if(!document.hidden) Storage.syncGitHub(true); }, 60000);
    },

    saveLocal: () => {
        localStorage.setItem('gtd_data', JSON.stringify(State.items));
        localStorage.setItem('gtd_history', JSON.stringify(State.history));
    },

    syncGitHub: async (forceLoad = false) => {
        if (!State.config.ghToken || State.isSyncing) return;
        
        const { ghOwner, ghRepo, ghPath, ghToken } = State.config;
        if(!ghOwner || !ghRepo) return;

        State.isSyncing = true;
        UI.updateStatus('syncing');

        const url = `https://api.github.com/repos/${ghOwner}/${ghRepo}/contents/${ghPath}`;
        
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github.v3+json' }});
            
            if (res.status === 404 && !forceLoad) {
                await Storage.uploadToGitHub(url, ghToken, null);
            } else if (res.ok) {
                const data = await res.json();
                const remoteContent = decodeURIComponent(escape(atob(data.content)));
                const remoteItems = JSON.parse(remoteContent);

                if (forceLoad) {
                    State.ghSha = data.sha;
                    State.items = remoteItems;
                    Storage.saveLocal();
                    UI.render();
                    UI.updateStatus('online');
                } else {
                    State.ghSha = data.sha;
                    await Storage.uploadToGitHub(url, ghToken, State.ghSha);
                }
            }
        } catch (e) {
            console.error("Sync Error:", e);
            UI.updateStatus('error');
        } finally {
            State.isSyncing = false;
        }
    },

    uploadToGitHub: async (url, token, sha) => {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(State.items, null, 2))));
        const body = { message: "GTD Sync", content: content };
        if (sha) body.sha = sha;

        const res = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            const data = await res.json();
            State.ghSha = data.content.sha;
            UI.updateStatus('online');
        }
    }
};

// --- 3. APP LOGIC ---
const App = {
    addToInbox: () => {
        const input = document.getElementById('inboxInput');
        const val = input.value.trim();
        if(!val) return;

        if(!State.history.includes(val)) {
            State.history.unshift(val);
            if(State.history.length > 50) State.history.pop();
            UI.renderHistory();
        }

        // Novo item ganha ordem alta para ir pro final (se necessário)
        const newItem = { id: Date.now(), text: val, status: 'inbox', updatedAt: Date.now(), order: Date.now() };
        State.items.push(newItem);
        input.value = '';
        Storage.saveLocal();
        UI.render();
        Storage.syncGitHub();
    },

    deleteItem: (id) => {
        if(confirm("Excluir tarefa?")) {
            // Conversão segura de ID (string/number)
            const idx = State.items.findIndex(i => i.id == id);
            if(idx > -1) {
                const item = State.items[idx];
                GoogleCal.handleEvent(item, 'trash');
                State.items.splice(idx, 1);
                Storage.saveLocal();
                UI.render();
                Storage.syncGitHub();
            }
        }
    },

    editItem: (id) => {
        const item = State.items.find(i => i.id == id);
        if(!item) return;
        const newTxt = prompt("Editar tarefa:", item.text);
        if(newTxt && newTxt !== item.text) {
            item.text = newTxt;
            if(item.status === 'calendar') GoogleCal.handleEvent(item, 'update');
            Storage.saveLocal();
            UI.render();
            Storage.syncGitHub();
        }
    },

    startMove: (id) => { 
        State.temp.activeIdx = State.items.findIndex(i => i.id == id); 
        document.getElementById('moveModal').style.display = 'flex'; 
    },
    
    finalizeMove: async (newStatus) => {
        document.getElementById('moveModal').style.display = 'none';
        if (State.temp.activeIdx === -1) return;
        const item = State.items[State.temp.activeIdx];
        await App.changeStatus(item, newStatus);
    },

    changeStatus: async (item, newStatus, aiDate = null, aiNote = null) => {
        const oldStatus = item.status;
        
        if(newStatus === 'completed') item.completedAt = new Date().toISOString(); 
        else delete item.completedAt;

        if(newStatus === 'calendar' || newStatus === 'waiting') {
            let dateStr = aiDate;
            if(!dateStr) dateStr = await UI.askDate();
            if(!dateStr) return;
            item.date = dateStr;
            if(newStatus === 'waiting' && !aiNote) {
                const who = prompt("Quem está responsável?");
                if(who) item.note = "Delegado: " + who;
            } else if(aiNote) item.note = aiNote;
        }

        item.status = newStatus;
        // Ao mover para Próximas Ações, joga para o fim da lista
        if(newStatus === 'next') item.order = Date.now();

        await GoogleCal.handleEvent(item, newStatus);
        Storage.saveLocal();
        UI.render();
        Storage.syncGitHub();
    },

    startProcessing: () => {
        State.temp.procIdx = State.items.findIndex(i => i.status === 'inbox');
        if(State.temp.procIdx > -1) {
            document.getElementById('processing-zone').style.display = 'block';
            document.getElementById('currentItem').innerText = State.items[State.temp.procIdx].text;
            UI.toStep('step-1');
        } else {
            UI.showToast("Caixa de Entrada Vazia!");
            document.getElementById('processing-zone').style.display = 'none';
        }
    },

    finalizeProc: async (status) => {
        await App.changeStatus(State.items[State.temp.procIdx], status);
        App.startProcessing();
    },

    // --- CORREÇÃO DA LÓGICA DE SEQUENCIAMENTO ---
    reorderTask: (id, direction) => {
        // 1. Pega a lista filtrada e ordenada atual
        // Conversão segura do ID para comparação
        let listGroup = State.items.filter(i => i.status === 'next');
        
        // Ordena baseado no que temos hoje (tratando undefined como 0)
        listGroup.sort((a,b) => (a.order || 0) - (b.order || 0));

        // 2. Normalização: Garante que todos tenham números sequenciais com espaçamento (1000, 2000, 3000)
        // Isso corrige tarefas antigas que não tinham 'order' ou tinham duplicatas
        listGroup.forEach((item, index) => {
            item.order = (index + 1) * 1000;
        });

        // 3. Encontra o índice na lista limpa e normalizada
        const idx = listGroup.findIndex(i => i.id == id);
        if (idx === -1) return;

        // 4. Efetua a troca (Swap) matemática
        if (direction === 'up' && idx > 0) {
            const currentItem = listGroup[idx];
            const prevItem = listGroup[idx - 1];
            
            // Troca os valores de ordem
            const temp = currentItem.order;
            currentItem.order = prevItem.order;
            prevItem.order = temp;

        } else if (direction === 'down' && idx < listGroup.length - 1) {
            const currentItem = listGroup[idx];
            const nextItem = listGroup[idx + 1];
            
            const temp = currentItem.order;
            currentItem.order = nextItem.order;
            nextItem.order = temp;
        }

        // 5. Salva e Renderiza
        Storage.saveLocal();
        UI.render();
        // Sincroniza (debounce idealmente, mas sync direto é mais seguro para integridade)
        Storage.syncGitHub();
    },

    toggleVoice: () => {
        if(!('webkitSpeechRecognition' in window)) return alert("Sem suporte a voz.");
        const r = new webkitSpeechRecognition();
        r.lang = "pt-BR";
        r.onstart = () => document.getElementById('voiceBtn').classList.add('listening');
        r.onend = () => document.getElementById('voiceBtn').classList.remove('listening');
        r.onresult = (e) => {
            const t = e.results[0][0].transcript;
            document.getElementById('inboxInput').value = t.charAt(0).toUpperCase() + t.slice(1);
        };
        r.start();
    }
};

// --- 4. UI RENDERER ---
const UI = {
    render: () => {
        const grid = document.getElementById('listsContainer');
        grid.innerHTML = '';
        
        const inboxCount = State.items.filter(i => i.status === 'inbox').length;
        document.getElementById('processButtons').style.display = inboxCount > 0 ? 'flex' : 'none';
        if(inboxCount === 0) document.getElementById('processing-zone').style.display = 'none';

        Object.keys(State.listDefinitions).forEach(key => {
            const def = State.listDefinitions[key];
            const listItems = State.items.filter(i => i.status === key);
            
            // Ordenação Visual
            if(def.sequenced) {
                listItems.sort((a, b) => (a.order || 0) - (b.order || 0));
            } else if (key === 'calendar') {
                listItems.sort((a, b) => new Date(a.date) - new Date(b.date));
            }

            const card = document.createElement('div');
            card.className = `list-card ${def.class}`;
            if(key === 'completed') card.style.gridColumn = '1 / -1';

            const header = `
                <div class="list-header">
                    <span>${def.title}</span>
                    <span class="badge">${listItems.length}</span>
                </div>`;
            
            const ul = document.createElement('ul');
            
            listItems.forEach((item, index) => {
                const li = document.createElement('li');
                
                let metaHtml = '';
                if(item.date) metaHtml += `<span>📅 ${new Date(item.date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>`;
                if(item.note) metaHtml += `<span>📝 ${item.note}</span>`;
                
                let seqBtns = '';
                let seqBadge = '';
                
                // Botões de Sequência (Apenas 'next')
                // NOTA: Passamos o ID como string '${item.id}' para segurança
                if(def.sequenced) {
                    seqBadge = `<div class="seq-num">${index + 1}</div>`;
                    seqBtns = `
                        <button class="btn-seq" onclick="event.stopPropagation(); App.reorderTask('${item.id}', 'up')">▲</button>
                        <button class="btn-seq" onclick="event.stopPropagation(); App.reorderTask('${item.id}', 'down')">▼</button>
                    `;
                }

                li.innerHTML = `
                    ${seqBadge}
                    <div class="task-content">
                        <span class="task-text">${item.text}</span>
                        ${metaHtml ? `<div class="meta">${metaHtml}</div>` : ''}
                    </div>
                    <div class="task-actions">
                        ${seqBtns}
                        <button class="btn-icon" onclick="event.stopPropagation(); App.editItem('${item.id}')">✏️</button>
                        <button class="btn-icon" onclick="event.stopPropagation(); AI.breakdownItem('${item.id}')">🤖</button>
                        <button class="btn-icon" onclick="event.stopPropagation(); App.startMove('${item.id}')">➡️</button>
                        <button class="btn-icon" style="color:var(--danger)" onclick="event.stopPropagation(); App.deleteItem('${item.id}')">🗑️</button>
                    </div>
                `;
                ul.appendChild(li);
            });

            card.innerHTML = header;
            card.appendChild(ul);
            grid.appendChild(card);
        });
        UI.renderHistory();
    },

    renderHistory: () => {
        const dl = document.getElementById('historyList');
        dl.innerHTML = '';
        State.history.forEach(h => { const op = document.createElement('option'); op.value = h; dl.appendChild(op); });
    },

    updateStatus: (status) => {
        const dot = document.getElementById('dbDot');
        const txt = document.getElementById('dbStatus');
        dot.className = `dot ${status}`;
        txt.innerText = status === 'online' ? 'GitHub Online' : status === 'syncing' ? 'Sincronizando...' : 'Erro / Offline';
    },

    showToast: (msg) => {
        const t = document.getElementById('toast');
        t.innerText = msg; t.className = 'show';
        setTimeout(() => t.className = '', 3000);
    },

    openConfig: () => {
        ['ghOwner','ghRepo','ghToken','ghPath','cfgClientId','cfgGemini'].forEach(k => {
            if(document.getElementById(k)) document.getElementById(k).value = State.config[k] || '';
        });
        document.getElementById('configModal').style.display = 'flex';
    },

    saveConfig: () => {
        const keys = ['ghOwner','ghRepo','ghToken','ghPath','cfgClientId','cfgGemini'];
        keys.forEach(k => State.config[k] = document.getElementById(k).value);
        localStorage.setItem('gtd_config', JSON.stringify(State.config));
        location.reload();
    },

    toStep: (id) => {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    askDate: () => new Promise(r => { document.getElementById('dateModal').style.display = 'flex'; State.temp.dateResolver = r; }),
    resolveDate: (val) => { document.getElementById('dateModal').style.display = 'none'; if(State.temp.dateResolver) State.temp.dateResolver(val); }
};

// --- 5. AI & INTEGRATIONS ---
const AI = {
    callGemini: async (prompt) => {
        if(!State.config.cfgGemini) throw new Error("Sem API Key do Gemini");
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${State.config.cfgGemini}`;
        const res = await fetch(url, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts[0].text;
    },

    magicProcess: async () => {
        const inbox = State.items.filter(i => i.status === 'inbox');
        if(!inbox.length) return UI.showToast("Inbox vazia.");
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        try {
            const inputList = inbox.map(i => `ID:${i.id} TXT:${i.text}`).join('\n');
            const prompt = `Analise estas tarefas GTD (Hoje: ${new Date().toISOString()}). Retorne JSON ARRAY: [{"id": "...", "status": "...", "date": "ISO", "note": "..."}]. Regras: 1.Data->calendar 2.Delegar->waiting 3.Rápido->do-now 4.Sonho->someday 5.Ref->reference 6.Complexo->project 7.Outros->next. Tarefas:\n${inputList}`;
            
            const txt = await AI.callGemini(prompt);
            const decisions = JSON.parse(txt.replace(/```json|```/g, '').trim());
            for(const d of decisions) {
                const item = State.items.find(i => i.id == d.id);
                if(item) await App.changeStatus(item, d.status, d.date, d.note);
            }
            UI.showToast("IA Finalizada!");
        } catch(e) { alert("Erro IA: " + e.message); } 
        finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    },

    breakdownItem: async (id) => {
        const item = State.items.find(i => i.id == id);
        if(!item || !confirm(`Quebrar "${item.text}" com IA?`)) return;
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const prompt = `Quebre "${item.text}" em 3-5 passos práticos. Retorne JSON Array de strings.`;
            const txt = await AI.callGemini(prompt);
            const steps = JSON.parse(txt.replace(/```json|```/g, '').trim());
            steps.forEach((stepText, idx) => {
                State.items.push({ id: Date.now() + idx, text: stepText, status: 'next', note: `Ref: ${item.text}`, updatedAt: Date.now(), order: Date.now() + idx });
            });
            item.status = 'project';
            Storage.saveLocal(); UI.render(); Storage.syncGitHub();
        } catch(e) { alert("Erro IA: " + e.message); }
        finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    }
};

const GoogleCal = {
    client: null,
    init: () => {
        if(!State.config.cfgClientId) return;
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'] });
            GoogleCal.client = google.accounts.oauth2.initTokenClient({
                client_id: State.config.cfgClientId, scope: 'https://www.googleapis.com/auth/calendar.events',
                callback: (resp) => {
                    if(resp.access_token) {
                        localStorage.setItem('gtd_gcal_token', JSON.stringify({t: resp.access_token, e: Date.now()+3500000}));
                        document.getElementById('btnAuthCalendar').style.background = 'var(--success)';
                        document.getElementById('btnAuthCalendar').style.color = 'white';
                    }
                }
            });
            const stored = JSON.parse(localStorage.getItem('gtd_gcal_token'));
            if(stored && Date.now() < stored.e) {
                gapi.client.setToken({access_token: stored.t});
                document.getElementById('btnAuthCalendar').style.background = 'var(--success)';
                document.getElementById('btnAuthCalendar').style.color = 'white';
            }
        });
    },
    handleEvent: async (item, action) => {
        if(!gapi.client.getToken()) return;
        try {
            if(item.googleEventId && (action === 'trash' || !['calendar','waiting'].includes(item.status))) {
                try { await gapi.client.calendar.events.delete({ calendarId: 'primary', eventId: item.googleEventId }); } catch(e){}
                delete item.googleEventId;
            }
            if(['calendar','waiting'].includes(item.status) && item.date) {
                const event = { summary: `GTD: ${item.text}`, description: item.note || '', start: { dateTime: new Date(item.date).toISOString() }, end: { dateTime: new Date(new Date(item.date).getTime()+1800000).toISOString() } };
                if(item.googleEventId) await gapi.client.calendar.events.update({ calendarId: 'primary', eventId: item.googleEventId, resource: event });
                else { const res = await gapi.client.calendar.events.insert({ calendarId: 'primary', resource: event }); item.googleEventId = res.result.id; }
            }
        } catch(e) { console.error("GCal Error", e); }
    }
};

// --- 6. EXPOSE & INIT ---
// Garante escopo global para o HTML encontrar as funções
window.App = App;
window.UI = UI;
window.AI = AI;

window.onload = () => {
    Storage.init();
    GoogleCal.init();
    App.authCalendar = () => GoogleCal.client.requestAccessToken();
};
</script>
